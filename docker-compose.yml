services:
  db:
    image: postgres:15
    container_name: pharmacy_postgres
    restart: always
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: